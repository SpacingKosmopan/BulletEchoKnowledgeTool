<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <h1>Welcome to Bullet Echo Knowledge Tool (BEKT)!</h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="container">
          <div id="heroes-cards"></div>
        </div>
      </main>

      <aside>
        <details class="dropdown">
          <summary>Heroes tips and tricks</summary>
          <nav class="dropdown-content" id="heroes-pages"></nav>
        </details>
        <details class="dropdown">
          <summary>Calculators</summary>
          <nav class="dropdown-content" id="calculators-pages">
            <a href="">Density</a>
            <a href="">Damage to enemy</a>
            <a href="">Hero power</a>
            <a href="">Hero upgrade cost</a>
            <a href="">Drone upgrade cost</a>
            <a href="">Gear upgrade cost</a>
            <a href="">Mod upgrade cost</a>
          </nav>
        </details>
        <details class="dropdown">
          <summary>Minigames</summary>
          <nav class="dropdown-content" id="minigames-pages"></nav>
        </details>
        <a href="changelog.html">Changelog</a>
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          ><i class="bi bi-youtube icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script>
      const heroes = [
        { name: "Alice", faction: "Renegades", class: "Scout" },
        { name: "Angel", faction: "Skytech Megacorp", class: "Scout" },
        { name: "Arnie", faction: "Renegades", class: "Enforcer" },
        { name: "Bastion", faction: "Skytech Megacorp", class: "Gunner" },
      ];
      heroes.sort((a, b) => a.name.localeCompare(b.name));

      function generateHeroesCards() {
        const heroesCardsContainer = document.querySelector("#heroes-cards");
        heroesCardsContainer.innerHTML = "";
        heroes.forEach((hero) => {
          const heroCard = document.createElement("div");
          heroCard.className = "hero-card";
          heroCard.addEventListener("click", () => {
            window.location.href = "heroes/index.html";
          });
          heroCard.innerHTML = `
          <img src="skins/${hero.name.toLocaleLowerCase()}.png" alt="${hero.name}-card">
          <div class="hero-name">${hero.name}</div>
        `;
          heroesCardsContainer.appendChild(heroCard);
        });
      }
      generateHeroesCards();

      function generateAsideHeroesPagesLinks() {
        const heroesPages = document.querySelector("#heroes-pages");
        heroesPages.innerHTML = "";
        heroes.forEach((hero) => {
          heroesPages.innerHTML += `<a href="heroes/index.html">${hero.name}</a>`;
        });
      }
      generateAsideHeroesPagesLinks();
    </script>
  </body>
</html>
