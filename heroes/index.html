<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../hexagon_badge.css" />
    <link rel="stylesheet" href="../character_card.css" />
    <link rel="stylesheet" href="../stripped_rectangle.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <h1>Welcome to Bullet Echo Knowledge Tool (BEKT)!</h1>
    </header>

    <div class="page-wrapper">
      <main>
        Page under construction <a href="../index.html">Return to main page</a>
        <div class="container">
          <div id="content-cards"></div>
        </div>
        <!--TODO: temp container -->
        <div class="bullet-echo-container">
          <div class="hexagon-glow-wrap">
            <div class="hexagon"></div>
            <div class="hexagon-text">III</div>
          </div>
          <!--TODO: hero card  -->
          <div class="panel-wrapper">
            <div class="character-panel">
              <!-- Szeroki pasek na samej górze (nad głową postaci) -->
              <div class="top-banner">
                <div class="banner-content">
                  <span class="char-name">ALICE</span>
                  <span class="char-lvl">LVL 72</span>
                </div>
              </div>

              <div class="panel-layout">
                <!-- LEWA STRONA: Paski statystyk i małe kwadratowe wskaźniki -->
                <div class="left-column">
                  <div class="stats-container">
                    <!-- Pasek 1 -->
                    <div class="stat-row hp">
                      <div class="stat-label">
                        <span>Zdrowie (HP)</span><span>85%</span>
                      </div>
                      <div class="bar-bg"><div class="bar-fill"></div></div>
                    </div>
                    <!-- Pasek 2 -->
                    <div class="stat-row mp">
                      <div class="stat-label">
                        <span>Pancerz</span><span>60%</span>
                      </div>
                      <div class="bar-bg"><div class="bar-fill"></div></div>
                    </div>
                    <!-- Pasek 3 -->
                    <div class="stat-row stamina">
                      <div class="stat-label">
                        <span>Prędkość</span><span>75%</span>
                      </div>
                      <div class="bar-bg"><div class="bar-fill"></div></div>
                    </div>
                  </div>

                  <!-- Małe kwadratowe elementy pod paskami -->
                  <div class="small-boxes">
                    <div class="neon-box">
                      <i class="bi bi-shield-shaded"></i>
                    </div>
                    <div class="neon-box">
                      <i class="bi bi-lightning-charge-fill"></i>
                    </div>
                  </div>
                </div>

                <!-- PRAWA STRONA: Postać na owalnym podeście -->
                <div class="right-column">
                  <div class="character-display">
                    <!-- Twoja grafika postaci z dopasowaną klasą -->
                    <img
                      src="../skins/alice.png"
                      alt="alice-skin"
                      class="char-img"
                    />
                    <!-- Owalny podest z Twojego rysunku -->
                    <div class="neon-pedestal"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!--TODO: stripped rectangle -->
          <div class="shape-container">
            <div class="trimmed-rectangle"></div>
            <div class="after-stripe op-7"></div>
            <div class="after-stripe op-4"></div>
          </div>
        </div>
      </main>

      <aside>
        <a href="../index.html"><i class="bi bi-house-fill"></i> Home</a>
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          ><i class="bi bi-youtube icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="heroes.js"></script>
  </body>
</html>
