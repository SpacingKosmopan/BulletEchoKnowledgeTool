<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/hexagon_badge.css" />
    <link rel="stylesheet" href="../styles/character_card.css" />
    <link rel="stylesheet" href="../styles/stripped_rectangle.css" />
    <link rel="stylesheet" href="../styles/scifi_hud.css" />
    <link rel="stylesheet" href="../styles/content_card.css" />
    <link rel="stylesheet" href="./article.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../favicon-16x16.png"
    />
    <link rel="manifest" href="../site.webmanifest" />

    <!--! Stripe Button Component -->
    <script src="../stripe_button_component.js" defer></script>
  </head>
  <body>
    <header class="welcome-header">
      <img
        src="../images/be_UI_single_stripe.webp"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="../images/be_UI_single_stripe_small.webp"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <p style="position: relative; z-index: 10">
          Page under construction. Contact Spacing on
          <a href="https://www.discord.gg/JZfqCRvVsA" target="_blank"
            >Discord</a
          >
          if you need or want to help.
          <a href="../index.html">Return to main page</a>
        </p>
        <div class="container">
          <div id="content-cards"></div>
          <div id="hero-content"></div>

          <div class="shape-container">
            <div class="trimmed-rectangle"></div>
            <div class="after-stripe op-7"></div>
            <div class="after-stripe op-4"></div>
          </div>

          <div id="hero-article">
            <h1 id="hero-article-header" style="margin: 20px auto"></h1>
            <hr />
            <div id="hero-articles-container"></div>
          </div>
        </div>
      </main>

      <aside>
        <stripe-button href="../index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >

        <stripe-button
          href="index.html"
          class="hidden"
          id="back-to-heroes-button"
        >
          <i class="bi bi-arrow-return-left"></i> Back to heroes
        </stripe-button>

        <stripe-button
          href="#hero-article"
          class="hidden"
          id="go-to-hero-article-button"
        >
          <i class="bi bi-arrow-down"></i> Go to article
        </stripe-button>
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          >YouTube &nbsp;<i class="bi bi-youtube icon-button"></i></a
        >&nbsp;
        <a href="https://www.discord.gg/JZfqCRvVsA" target="_blank"
          >Discord &nbsp;<i class="bi bi-discord icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="heroes.js"></script>
  </body>
</html>
