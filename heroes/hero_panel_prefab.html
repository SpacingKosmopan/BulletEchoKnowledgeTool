<div class="hero-info-container">
  <div class="panel-wrapper">
    <div class="hexagon-glow-wrap">
      <div class="hexagon"></div>
      <div class="hexagon-text">
        <img
          src="../classes/${hero.class.toLowerCase()}.png"
          alt="${hero.class}-icon"
        />
      </div>
    </div>

    <div class="sci-fi-frame">
      <div class="inner-content">Faction: ${hero.faction}</div>
    </div>

    <div class="character-panel">
      <div class="top-banner">
        <div class="banner-content">
          <span class="char-name">${hero.name}</span>
          <span class="char-lvl">${hero.faction} ${hero.class}</span>
        </div>
      </div>

      <div class="panel-layout">
        <div class="left-column">
          <div class="stats-container"></div>

          <div class="small-boxes">
            <div class="neon-box">
              <i class="bi bi-shield-shaded"></i>
            </div>
            <div class="neon-box">
              <i class="bi bi-lightning-charge-fill"></i>
            </div>
          </div>
        </div>

        <div class="right-column">
          <div class="character-display">
            <img
              src="../skins/${hero.name.toLowerCase()}.png"
              alt="${hero.name}-skin"
              class="char-img"
            />
            <div class="neon-pedestal"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <stripe-button href="index.html"
    ><i class="bi bi-arrow-return-left"></i> Back to heroes</stripe-button
  >
</div>
