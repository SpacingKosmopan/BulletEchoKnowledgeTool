<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./depixelisation.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <script src="../stripe_button_component.js" defer></script>
  </head>
  <body>
    <header class="welcome-header">
      <img
        src="../images/be_UI_single_stripe.png"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="../images/be_UI_single_stripe_small.png"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="container">
          <div class="centered">
            <div id="game-controlls">
              <h1>Depixelisation - guess what is this!</h1>
              <button id="generate-image">Start</button>
              <button id="depixelise" class="hidden">Depixelise</button>
              <p id="tip-text"></p>
            </div>
            <div class="image-wrapper">
              <canvas id="pixel-canvas"></canvas>
            </div>
          </div>
        </div>
      </main>

      <aside>
        <stripe-button href="../index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >
        <stripe-button href="./index.html"
          ><i class="bi bi-arrow-return-left"></i> Minigames</stripe-button
        >
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          ><i class="bi bi-youtube icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="depixelisation.js"></script>
  </body>
</html>
