<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!--! Stripe Button Component -->
    <script src="../stripe_button_component.js" defer></script>
  </head>
  <body>
    <header class="welcome-header">
      <img
        src="../images/be_ui_single_stripe.png"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="../images/be_ui_single_stripe_small.png"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="container">
          <div id="content-cards">
            <div
              class="content-card"
              onclick="setLocation(`./guess_the_map.html`)"
            >
              <img src="./images/guess_the_map.png" alt="content-card" />
              <div class="content-card-name">Guess the map</div>
            </div>
            <div
              class="content-card"
              onclick="setLocation(`./guess_the_hero.html`)"
            >
              <img src="./images/guess_the_hero.png" alt="content-card" />
              <div class="content-card-name">Guess the hero</div>
            </div>
            <div
              class="content-card"
              onclick="setLocation(`./depixelisation.html`)"
            >
              <img src="./images/depixelisation.png" alt="content-card" />
              <div class="content-card-name">Depixelisation</div>
            </div>
            <div class="content-card" onclick="setLocation(`./crossword.html`)">
              <img src="./images/crossword.png" alt="content-card" />
              <div class="content-card-name">Crossword</div>
            </div>
          </div>
        </div>
      </main>

      <aside>
        <stripe-button href="../index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          ><i class="bi bi-youtube icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script>
      function setLocation(location) {
        window.location.href = location;
      }
    </script>
  </body>
</html>
