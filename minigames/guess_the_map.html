<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./guess_the_map.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <script src="../stripe_button_component.js" defer></script>
  </head>
  <body>
    <header class="welcome-header">
      <img
        src="images/be_ui_single_stripe.png"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="images/be_ui_single_stripe_small.png"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="container">
          <div class="centered">
            <h1>Guess the map by fragment</h1>
            <button id="start-btn">Start</button>
            <button id="answer-btn" class="hidden">Answer</button>
            <p id="answer-text" class="hidden">This is ???</p>
            <img
              src=""
              alt="map fragment image"
              id="fragment-image"
              class="hidden"
            />
          </div>
        </div>
      </main>

      <aside>
        <stripe-button href="../index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >
        <stripe-button href="./index.html"
          ><i class="bi bi-arrow-return-left"></i> Minigames</stripe-button
        >
        <h2>Maps list:</h2>
        <div id="maps-list"></div>
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          ><i class="bi bi-youtube icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="guess_the_map.js"></script>
  </body>
</html>
