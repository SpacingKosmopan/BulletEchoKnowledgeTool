<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/neoscifi_button.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../favicon-16x16.png"
    />
    <link rel="manifest" href="../site.webmanifest" />

    <script src="../stripe_button_component.js" defer></script>
  </head>
  <body>
    <header class="welcome-header">
      <img
        src="../images/be_UI_single_stripe.webp"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="../images/be_UI_single_stripe_small.webp"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="container">
          <div class="centered">
            <h1>
              Guess the hero
              <p style="font-size: 60%">
                By sound / emoji / shadow / gear / icon
              </p>
            </h1>

            <p id="round-number">Round <b>X</b> / ?</p>
            <div class="be-btn-container">
              <button id="start-game-btn" class="be-neon-button">
                <p>Start</p>
              </button>
            </div>
            <div class="be-btn-container">
              <button id="next-question-btn" class="be-neon-button hidden">
                <p>Next</p>
              </button>

              <button id="show-answer-btn" class="be-neon-button hidden">
                <p>Answer</p>
              </button>
            </div>
            <div id="answer-content" class="hidden">
              <p id="answer-text">This hero is called ???</p>
            </div>
            <div id="question-content">
              <!-- AUDIO PLAYER -->
              <div class="hidden" id="question-regular"></div>
              <div class="audio-player hidden" id="audio-player">
                <audio id="my-audio" src=""></audio>

                <button id="btn-play-pause">Play</button>
                <button id="btn-stop">Stop</button>

                <label for="volume-slider">Volume:</label>
                <input
                  type="range"
                  id="volume-slider"
                  min="0"
                  max="1"
                  step="0.1"
                  value="1"
                />

                <span id="time-display">0:00</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <aside>
        <stripe-button href="../index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >
        <stripe-button href="./index.html"
          ><i class="bi bi-arrow-return-left"></i> Minigames</stripe-button
        >
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          >YouTube &nbsp;<i class="bi bi-youtube icon-button"></i></a
        >&nbsp;
        <a href="https://www.discord.gg/JZfqCRvVsA" target="_blank"
          >Discord &nbsp;<i class="bi bi-discord icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="guess_the_hero.js"></script>
  </body>
</html>
