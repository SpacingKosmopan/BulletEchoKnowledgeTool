<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bullet Echo Knowledge</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/markdown.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon-16x16.png"
    />
    <link rel="manifest" href="./site.webmanifest" />

    <!--! Stripe Button Component -->
    <script src="./stripe_button_component.js" defer></script>
    <!--! tally form -->
    <script async src="https://tally.so/widgets/embed.js"></script>
  </head>
  <body>
    <button id="backToTop" class="back-to-top" title="Back">↑</button>

    <header class="welcome-header">
      <img
        src="images/be_UI_single_stripe.webp"
        alt="Background"
        class="header-bg"
        id="long-header"
      />
      <img
        src="images/be_UI_single_stripe_small.webp"
        alt="Background"
        class="header-bg"
        id="small-header"
      />
      <h1 class="welcome-header-text">
        Welcome to Bullet Echo Knowledge Tool (BEKT)!
      </h1>
    </header>

    <div class="page-wrapper">
      <main>
        <div class="changelog-container">
          <h1>Recent updates</h1>
          <div id="changelog-content" class="markdown-body"></div>
        </div>
      </main>

      <aside>
        <stripe-button href="./index.html"
          ><i class="bi bi-house-fill"></i> Home</stripe-button
        >
      </aside>
    </div>

    <footer>
      <p>
        Made by: Spacing Kosmopan |
        <a href="https://www.youtube.com/@Spacing_Gaming" target="_blank"
          >YouTube &nbsp;<i class="bi bi-youtube icon-button"></i></a
        >&nbsp;
        <a href="https://www.discord.gg/JZfqCRvVsA" target="_blank"
          >Discord &nbsp;<i class="bi bi-discord icon-button"></i
        ></a>
        | Support with creator code: <u>SPACING</u> in Shop ➡ Premium
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      // [#hex]Tekst[/#] => <span style="color: #hex">Tekst</span>
      function parseCustomColors(text) {
        return text.replace(
          /\[(#(?:[0-9a-fA-F]{3}){1,2})\](.*?)\[(?:\/#|#(?:[0-9a-fA-F]{3}){1,2})\]/g,
          (_, color, content) =>
            `<span style="color: ${color}">${content}</span>`,
        );
      }

      async function loadMd() {
        const res = await fetch("changelog.md");
        let md = await res.text();

        md = parseCustomColors(md);

        const html = marked.parse(md);
        document.querySelector("#changelog-content").innerHTML = html;
      }

      loadMd();

      // update check
      const isNewerVersion = (v1, v2) => {
        if (!v1) return true;
        const parts1 = v1.split(".").map(Number);
        const parts2 = v2.split(".").map(Number);

        for (let i = 0; i < Math.max(parts1.length, parts2.length); i++) {
          const p1 = parts1[i] || 0;
          const p2 = parts2[i] || 0;
          if (p2 > p1) return true;
          if (p2 < p1) return false;
        }
        return false;
      };

      const lastUpdate = localStorage.getItem("current-version");
      const NEWEST_VERSION = "1.3";

      if (isNewerVersion(lastUpdate, NEWEST_VERSION)) {
        localStorage.setItem("current-version", NEWEST_VERSION);
      }
    </script>
    <script src="./back_to_top_btn.js"></script>
  </body>
</html>
